# factory.config.yaml — single source for all tunable factory parameters (Doctrine §14).
# Starter values founder-approved 10-06-2026 (decision log D-0005, D-0011); recalibrate on DoD §13 evidence.
# Role prompts and code reference these keys by name — never hardcode values elsewhere.

factory:
  home: /home/artur/projects/SF-F5
  timezone_founder: Europe/Chisinau   # founder-facing rendering only; machine timestamps are ISO 8601 UTC

projects:
  erp:
    docs_repo: /home/artur/projects/ERP-start
    workspace: /home/artur/projects/erp-workspace   # created at Etapa 5 kickoff
    integration_branch: main
    worktrees_dir: /home/artur/projects/erp-workspace/.worktrees
    test_command: "bash scripts/test.sh"   # OPEN-2 closed: ratified at the intake interview 12-06-2026 (D-ERP-0001)
    proving_phases: [foundation, inventory-procurement]
    project_md: docs/projects/erp/PROJECT.md   # Phase-Architect project context (factory-repo-relative; phase-seeding design §4)

models:
  # role -> CLI + model alias (resolved by the respective CLI). Cross-model pairs per D-0003.
  # effort (CCR-6) omitted on purpose where the knob does not apply: main_architect (interactive — the founder launcher owns --effort), cp1_triage (haiku does not support effort).
  # D-0038: codex roles now carry effort too — gpt-5.5 reasoning level via `-c model_reasoning_effort="xhigh"` (codex tops at xhigh; founder-directed).
  # D-0038 (14-06-2026): Fable went 404/model_not_found (indefinite); the 7 fable
  # roles below rerouted fable→opus (founder-approved 'A'). Capability downshift
  # (Fable is Mythos-tier, above Opus) — watch escalation frequency on heavy stages
  # per DoD §13; finer stage granularity is the registered trigger-gated response.
  main_architect:        {cli: claude, model: opus,    mode: interactive}
  phase_architect:       {cli: claude, model: opus,    mode: print, effort: xhigh}
  spec_agent:            {cli: claude, model: opus,    mode: print, effort: xhigh}
  builder_routine:       {cli: claude, model: sonnet,  mode: print, effort: high}
  builder_heavy:         {cli: claude, model: opus,    mode: print, effort: xhigh}
  # 2-D builder routing (kind × risk), founder-approved 22-06: backend stages →
  # codex (gpt-5.5, offload onto the codex limit window for capacity); frontend
  # stages → claude (opus), including routine-risk frontend → opus (UI quality +
  # UX-laws injection). kind=None legacy stages keep builder_routine/builder_heavy
  # above. codex builders mirror auditor_cross_model's route shape (no tools block).
  builder_backend_routine:  {cli: codex,  model: gpt-5.5, mode: print, effort: high}
  builder_backend_heavy:    {cli: codex,  model: gpt-5.5, mode: print, effort: xhigh}
  builder_frontend_routine: {cli: claude, model: opus,    mode: print, effort: high}
  builder_frontend_heavy:   {cli: claude, model: opus,    mode: print, effort: xhigh}
  validator:             {cli: claude, model: sonnet,  mode: print, effort: high}
  validator_structural:  {cli: claude, model: opus,    mode: print, effort: xhigh}
  # D-0041: integration validator moved codex(gpt-5.5)→opus. Its merge-gate payload
  # = full diff of the gating unit + ALL sibling diffs since contract freeze; that
  # grows with each merged sibling and exceeded gpt-5.5's context window on
  # document-engine (the 4th-merging unit). DoD §5.2 cross-model is PREFERRED, not
  # mandatory; opus's 1M window is the hard requirement (the validator must FIT what
  # it reviews). Cross-model diversity stays at the per-stage AUDIT (auditor_cross_model).
  # tools allowlist (context-budget fix, 2026-06-15): the FULL 32-tool built-in set
  # is ~half this agent's prompt (its JSON schemas) and tipped opus past the 1M window
  # at the merge gate (request ~1.05M tokens). It only READS inputs (its diffs/contracts
  # are embedded in the prompt, but it may Read a cited file in the scratch worktree —
  # diffs are bounded at process.tier2_max_diff_bytes_per_unit) and WRITES its mandatory
  # integration-report.md + integration-report.json sidecar (scheduler _tier2). Read+Write
  # only; CLI-verified the Write still lands in print mode (paired with bypassPermissions).
  integration_validator: {cli: claude, model: opus,    mode: print, effort: xhigh, tools: [Read, Write]}
  auditor_same_model:    {cli: claude, model: opus,    mode: print, effort: xhigh}
  auditor_cross_model:   {cli: codex,  model: gpt-5.5, mode: print, effort: xhigh}
  cp1_triage:            {cli: claude, model: haiku,   mode: print}   # output is schema-validated anyway
  # CCR-11 (D-0037): the capacity governor's hold-exit canary — cheapest claude
  # print run; an ordinary registered agent run (process registry + ledger).
  capacity_probe:        {cli: claude, model: haiku,   mode: print, tools: none}   # canary: zero-write (verifier finding 3)
  # Decision Sessions are rare, turn-bounded and TOOLS-OFF (structural no-write
  # enforcement); founder-facing trade-off reasoning warrants the strongest model
  # (D-0017, OPEN-D3 resolved).
  decision_session:      {cli: claude, model: opus,    mode: print, tools: none, effort: high}

budgets:
  per_stage:                          # tokens per stage by risk class; keys mirror risk_classes
    # Recalibrated 12-06-2026 (D-0026) on FIRST real-stage evidence: the ledger counts RAW context
    # flow (input + cache creation + cache reads — deliberate, see runner.py budget note); a healthy
    # routine build run measured ~6M raw. Caps ≈ 5x healthy single-pass so the detector catches
    # runaways, not honest work. D-0005 starter values (300k/1M/2M) predate any real run.
    routine: 30000000
    structural: 250000000   # D-0046: 200M→250M (founder-directed 15-06-2026) — proactive headroom for
                            # status-notifications (status-layer + notification framework, a large 2-subsystem
                            # structural stage; ~176M mid-validate and climbing) so it does NOT stall near
                            # completion like auth-access did at its merge gate (D-0045). Founder: "la prima
                            # ocazie, altfel riscăm să pierdem lucrul." Now == the critical cap. Caps catch
                            # RUNAWAYS, not honest rework; max_fix_iterations/churn are the loop guards. BOUNDED:
                            # split a structural stage that exceeds 250M (do NOT extend again).
                            # (History: D-0039 75→120 for document-engine; D-0045 120→200.) Revisit downward once split.
    critical: 364000000   # D-0060 (founder-directed 19-06-2026, ETAPA-5n): 280M→364M (+30%) — stocktaking (~260M)
                          # and warehouse-issue (~274M) are at the wall and need headroom to clear AUDIT/§9/merge-gate
                          # ("altfel nu vor trece de gate integrare"). SUPERSEDES the planned 280M→250M revert.
                          # Applied as the shared critical cap (no per-stage override exists), harmless to the
                          # under-cap criticals (returns-supplier-client ~174M, supplier-fiscal-invoice ~156M).
                          # Takes effect on the NEXT orchestrator restart (config is load-once). NOTE: this EXTENDS
                          # rather than splits — the split-discipline still stands for FUTURE critical stages (plan
                          # them finer; do not keep raising the ceiling). (Prior: D-0058 250M→280M ONE-TIME for warehouse-issue.)
                          # --- prior rationale (cap history) ---
                          # D-0045: 220M→250M (founder-approved 15-06-2026). auth-access PASSED everything
                          # (validate + dual-audit + human re-confirm + merge-gate Tier-1/Tier-2 green) but the
                          # final integration check's own cost tipped it to 225.65M — 2.6% over the 220M cap, a
                          # COMPLETION overage, NOT a runaway. rework:MERGE_GATE re-runs the integration_validator
                          # (~10-20M) so the cap must clear ~240M. Opus-era critical stages run larger than the
                          # Fable-calibrated cap; auth-access is the broadest. BOUNDED: if a FUTURE critical stage
                          # exceeds 250M, SPLIT (finer decomposition), do NOT extend again. (D-0044 history:
                          # 150M→220M for the same broad-[23]-scope stage.) Future critical stages decomposed finer.
  usage_missing_policy: estimate      # estimate = logged-stream-bytes/4 into ledger (estimated=1) | escalate_after
  usage_missing_max_per_stage: 3      # used by escalate_after policy

escalation:
  max_fix_iterations: 3        # BUILD->VALIDATE loops without failing-test count decreasing
  churn_threshold: 12          # diff hunks landing in one file region across a stage's builds; measured healthy life (creation + one rework) = 4 — recalibrated ~3x (D-0032)
  churn_region_lines: 40       # hunk-bucket size for the churn detector
  max_context_resets: 1        # context_budget firings executed as reset before escalating
  decision_latency_alert_h: 24 # founder decision sitting unanswered -> alert (DoD §13)
  stuck_escalation_threshold_min: 30 # open-too-long climb (2a) + resolved-not-advanced (2b) trigger past this age
  merge_gate_max_tier1_failures: 3 # Tier-1 suite fails this many times since last escalation -> ESCALATE, not re-loop (incident 22-06: treasury socket-path loop, 12x)
                          # RESTORED to 30 by ETAPA-5f after the proper case-2b fix shipped: the over-fire (case-2b
                          # paging escalation_stuck_resolved for EVERY old resolved escalation of a re-ESCALATED unit,
                          # ~32 false [arhitect] pages) is fixed by scoping (2b) to each unit's MOST-RECENT escalation
                          # (scheduler._stuck_escalation_detector + db.latest_escalation_ids_by_unit). The 999999 TEMP
                          # disable (D-0044) is retired.

risk_classes:
  routine:    {validator: validator,            audits: []}
  structural: {validator: validator_structural, audits: [auditor_same_model, auditor_cross_model]}
  critical:   {validator: validator_structural, audits: [auditor_same_model, auditor_cross_model], human_gate: true}

economics:
  dual_audit_structural: true  # second auditor's marginal cost ~0 on current subscriptions (DoD §7)

capacity_governor:
  # CCR-11 (D-0037): on a usage-limit detection the factory drains itself (no new
  # claude-route spawns; codex/stub proceed), probes with models.capacity_probe and
  # resumes ALONE — limit-marked agent_run_failed escalations auto-resolve on lift.
  # enabled: false = behavior identical to pre-CCR-11 (pinned by test).
  enabled: true
  probe_interval_s: 300
  # On hold lift, also page the architect ("reia lucrul") so it resumes alone
  # (D-0042, robustness UNIT 3). Default-on; set false to suppress the second buzz.
  notify_architect_on_resume: true
  # D-0059 (founder-directed 19-06-2026): PROACTIVE %-threshold drain. The
  # orchestrator OAuth-polls the live usage every proactive_poll_interval_s and,
  # BEFORE the wall, holds new claude spawns once the 5h OR weekly utilization
  # crosses its threshold; running agents finish; the hold lifts on its own once
  # BOTH are back under threshold (after the reset). Reactive note_match backstops.
  proactive_enabled: true
  proactive_poll_interval_s: 300   # ~12 polls/hr, 429-safe (sf-limit.sh cadence)
  five_hour_threshold_pct: 80      # founder 19-06: hold at 80% of the 5h window
  seven_day_threshold_pct: 90      # founder 19-06: hold at 90% of the weekly window

pricing:
  # USD per 1M tokens, keyed by LEDGER model strings (design §11.1, CCR-10). Founder-tunable;
  # starter values = API list prices 06-2026 (reviewer-verified). Used ONLY where the CLI reports
  # no exact cost (token_ledger.cost_usd NULL); such sums render with the `~` estimate prefix.
  # Costs are API-equivalent value — subscriptions pay differently (the dashboard legend says so).
  usd_per_mtok:
    fable:    {input: 10,   output: 50}
    sonnet:   {input: 3,    output: 15}
    haiku:    {input: 1,    output: 5}
    opus:     {input: 5,    output: 25}   # D-0038: now the live heavy-role model (ledger records alias 'opus')
    # codex ledger rows record the route model: pre-D-0038 = 'default', now = 'gpt-5.5'. Values
    # operator-estimated, to be verified against the OpenAI account — codex sums are ~ estimates
    # either way (design §11.5.4 watch item). 'default' retained for historical ledger rows.
    default:  {input: 1.25, output: 10}
    gpt-5.5:  {input: 5,    output: 30}   # gpt-5.5 published list price (reconciled 22-06 from the prior $1.25/$10 estimate; still subject to real-invoice verification)

consultation_points:
  # The ONLY registered points. Any orchestrator LLM call outside this registry = governance breach (DoD §4),
  # detectable mechanically from logs. Adding a point = config change + macro decision-log entry.
  - id: CP-1
    purpose: feedback-loop triage when deterministic thresholds do not decide
    inputs: [validation_report, diff_digest, spec]
    verdicts: [continue_session, rebuild, respec, escalate]
    fallback: escalate
    role: cp1_triage
    max_input_bytes: 200000

founder_channel:
  ntfy:
    server: https://ntfy.sh
    topic: claude-artur-md-hello   # founder-approved plain topic (D-0004); payloads: title + deep link only
    priority_decision: high
    priority_alert: max
    timeout_s: 10
  dashboard:
    bind: tailscale   # serve only on the tailnet interface
    port: 8377
    refresh_s: 30               # main page <meta refresh> cadence (D-0017)
    answer_timeout_s: 60        # bound on every POST thread->loop marshal -> RO 504 on expiry
    read_timeout_s: 10          # bound on GET marshals + per-socket read timeout
    max_request_bytes: 65536    # POST body cap
    restart_delay_s: 30         # supervisor restart backoff after a dashboard crash
    page_every_n_restarts: 20   # max-priority page on crash 1, then every Nth restart (dedup)
    bind_recheck_s: 300         # tailscale-IP drift re-check cadence (design §7)
  watchdog:
    check_interval_s: 60
    staleness_threshold_s: 300   # must stay >= 10x process.loop_tick_s
  decision_session:              # orchestrator-mediated founder sessions (OPEN-4, D-0017)
    max_turns: 10
    turn_timeout_s: 300
    budget_tokens: 200000
    poll_s: 3
  # Lowercase substrings matched case-insensitively against agent result text + the
  # stderr tail (scheduler usage-limit detector). Provenance: the D-0021 billing-403
  # incident class; founder asked to be paged on capacity events (12-06-2026).
  # "spend limit" added 12-06-2026: the first real capacity event ("You've hit your
  # monthly spend limit") matched NO prior signature — detector silent, founder
  # self-discovered the outage (D-0034).
  usage_limit_signatures: ["subscription access", "usage limit", "rate limit", "limit reached", "spend limit"]

process:
  agent_timeout_s: 3600
  max_parallel_agents: 4          # economics knob (5h subscription window), not a technical limit
  ndjson_log_dir: .factory/logs   # operational, gitignored
  db_path: .factory/factory.db    # SQLite WAL, orchestrator-exclusive (DoD §6)
  db_busy_timeout_ms: 5000
  liveness_file: .factory/liveness
  pid_file: .factory/orchestrator.pid   # also the single-instance flock target
  terminate_grace_s: 10
  kill_grace_s: 5
  ndjson_max_line_bytes: 1048576
  test_suite_timeout_s: 1800
  loop_tick_s: 5                  # scheduler tick / liveness refresh
  heartbeat_min_interval_s: 1
  tier2_max_diff_bytes_per_unit: 300000
  # D-0046: total-prompt byte ceiling for the Tier-2 integration_validator. Above
  # this, sibling diffs collapse to file+@@ hunk headers (not full bodies) so the
  # print-mode prompt stays under the 1M context window; the gating unit's diff +
  # contracts always stay verbatim. Measured: posting-engine full-body=2.36MB
  # (~587k conv tok @ ~4 B/tok) overflowed; header-mode=0.39MB (~97k tok). 1.5MB
  # keeps full fidelity for conv <=~375k tok (<=~823k total w/ ~448k fixed overhead).
  tier2_max_total_bytes: 1500000
  stub_agent_path: tests/stub_agent.py   # used only by routes with cli: stub (tests)
  # Build/test droppings the §3.1 Validator-isolation assertion ignores (fnmatch
  # against each porcelain path and its path segments; directories end with /).
  isolation_ignore_globs: ["__pycache__/", "*.pyc", ".pytest_cache/", ".ruff_cache/"]

canon:
  # Canon files injected into agent system prompts (decision D-0009).
  # claude CLI -> --append-system-prompt; codex CLI -> AGENTS.md in workspace / prompt prefix.
  files:
    doctrine: "00 - DOCTRINA.md"
    conventions: work-protocols/conventions.md
    founder_protocol: work-protocols/protocol_interactiune_founder.md
    architect_ops: work-protocols/architect-operations.md   # D-0040
    ui_ux_laws: work-protocols/ui-ux-laws.md   # binding UI/UX laws, injected ONLY on frontend stages
  inject:
    pipeline_agents: [doctrine, conventions]            # every role producing artifacts or judgment
    founder_facing: [doctrine, conventions, founder_protocol]
    consultation_points: []   # pure functions, mechanically validated; flip on if DoD §13 CP-quality trigger fires
    architect: [architect_ops]   # D-0040: ADDITIVE layer, composed onto the base bundle for architect_roles
    frontend: [ui_ux_laws]   # ADDITIVE front-gated layer: composed on top for stage_kind=='frontend' agents (builder/validator/auditor), NOT consultation
  founder_facing_roles: [intake, decision_session, main_architect, phase_architect, notify]
  # D-0040: architect-class roles take the architect layer ON TOP of their base bundle.
  # main_architect/phase_architect are also founder-facing → they get the UNION
  # (doctrine+conventions+founder_protocol+architect_ops); spec_agent is a pipeline
  # role → it gets doctrine+conventions+architect_ops (no founder_protocol).
  architect_roles: [main_architect, phase_architect, spec_agent]
