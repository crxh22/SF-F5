# factory.config.yaml — single source for all tunable factory parameters (Doctrine §14).
# Starter values founder-approved 10-06-2026 (decision log D-0005, D-0011); recalibrate on DoD §13 evidence.
# Role prompts and code reference these keys by name — never hardcode values elsewhere.

factory:
  home: /home/artur/projects/SF-F5
  timezone_founder: Europe/Chisinau   # founder-facing rendering only; machine timestamps are ISO 8601 UTC

projects:
  erp:
    docs_repo: /home/artur/projects/ERP-start
    workspace: /home/artur/projects/erp-workspace   # created at Etapa 5 kickoff
    integration_branch: main
    worktrees_dir: /home/artur/projects/erp-workspace/.worktrees
    test_command: "bash scripts/test.sh"   # OPEN-2 closed: ratified at the intake interview 12-06-2026 (D-ERP-0001)
    proving_phases: [foundation, inventory-procurement]
    project_md: docs/projects/erp/PROJECT.md   # Phase-Architect project context (factory-repo-relative; phase-seeding design §4)

models:
  # role -> CLI + model alias (resolved by the respective CLI). Cross-model pairs per D-0003.
  # effort (CCR-6) omitted on purpose where the knob does not apply: main_architect (interactive — the founder launcher owns --effort), cp1_triage (haiku does not support effort), integration_validator + auditor_cross_model (codex has no effort knob).
  main_architect:        {cli: claude, model: fable,   mode: interactive}
  phase_architect:       {cli: claude, model: fable,   mode: print, effort: xhigh}
  spec_agent:            {cli: claude, model: fable,   mode: print, effort: xhigh}
  builder_routine:       {cli: claude, model: sonnet,  mode: print, effort: high}
  builder_heavy:         {cli: claude, model: fable,   mode: print, effort: xhigh}
  validator:             {cli: claude, model: sonnet,  mode: print, effort: high}
  validator_structural:  {cli: claude, model: fable,   mode: print, effort: xhigh}
  integration_validator: {cli: codex,  model: default, mode: print}   # cross-model preferred (DoD §5.2)
  auditor_same_model:    {cli: claude, model: fable,   mode: print, effort: xhigh}
  auditor_cross_model:   {cli: codex,  model: default, mode: print}
  cp1_triage:            {cli: claude, model: haiku,   mode: print}   # output is schema-validated anyway
  # Decision Sessions are rare, turn-bounded and TOOLS-OFF (structural no-write
  # enforcement); founder-facing trade-off reasoning warrants the strongest model
  # (D-0017, OPEN-D3 resolved).
  decision_session:      {cli: claude, model: fable,   mode: print, tools: none, effort: high}

budgets:
  per_stage:                          # tokens per stage by risk class; keys mirror risk_classes
    # Recalibrated 12-06-2026 (D-0026) on FIRST real-stage evidence: the ledger counts RAW context
    # flow (input + cache creation + cache reads — deliberate, see runner.py budget note); a healthy
    # routine build run measured ~6M raw. Caps ≈ 5x healthy single-pass so the detector catches
    # runaways, not honest work. D-0005 starter values (300k/1M/2M) predate any real run.
    routine: 30000000
    structural: 75000000
    critical: 150000000
  usage_missing_policy: estimate      # estimate = logged-stream-bytes/4 into ledger (estimated=1) | escalate_after
  usage_missing_max_per_stage: 3      # used by escalate_after policy

escalation:
  max_fix_iterations: 3        # BUILD->VALIDATE loops without failing-test count decreasing
  churn_threshold: 4           # edits to the same file region within one stage
  churn_region_lines: 40       # hunk-bucket size for the churn detector
  max_context_resets: 1        # context_budget firings executed as reset before escalating
  decision_latency_alert_h: 24 # founder decision sitting unanswered -> alert (DoD §13)

risk_classes:
  routine:    {validator: validator,            audits: []}
  structural: {validator: validator_structural, audits: [auditor_same_model, auditor_cross_model]}
  critical:   {validator: validator_structural, audits: [auditor_same_model, auditor_cross_model], human_gate: true}

economics:
  dual_audit_structural: true  # second auditor's marginal cost ~0 on current subscriptions (DoD §7)

consultation_points:
  # The ONLY registered points. Any orchestrator LLM call outside this registry = governance breach (DoD §4),
  # detectable mechanically from logs. Adding a point = config change + macro decision-log entry.
  - id: CP-1
    purpose: feedback-loop triage when deterministic thresholds do not decide
    inputs: [validation_report, diff_digest, spec]
    verdicts: [continue_session, rebuild, respec, escalate]
    fallback: escalate
    role: cp1_triage
    max_input_bytes: 200000

founder_channel:
  ntfy:
    server: https://ntfy.sh
    topic: claude-artur-md-hello   # founder-approved plain topic (D-0004); payloads: title + deep link only
    priority_decision: high
    priority_alert: max
    timeout_s: 10
  dashboard:
    bind: tailscale   # serve only on the tailnet interface
    port: 8377
    refresh_s: 30               # main page <meta refresh> cadence (D-0017)
    answer_timeout_s: 60        # bound on every POST thread->loop marshal -> RO 504 on expiry
    read_timeout_s: 10          # bound on GET marshals + per-socket read timeout
    max_request_bytes: 65536    # POST body cap
    restart_delay_s: 30         # supervisor restart backoff after a dashboard crash
    page_every_n_restarts: 20   # max-priority page on crash 1, then every Nth restart (dedup)
    bind_recheck_s: 300         # tailscale-IP drift re-check cadence (design §7)
  watchdog:
    check_interval_s: 60
    staleness_threshold_s: 300   # must stay >= 10x process.loop_tick_s
  decision_session:              # orchestrator-mediated founder sessions (OPEN-4, D-0017)
    max_turns: 10
    turn_timeout_s: 300
    budget_tokens: 200000
    poll_s: 3
  # Lowercase substrings matched case-insensitively against agent result text + the
  # stderr tail (scheduler usage-limit detector). Provenance: the D-0021 billing-403
  # incident class; founder asked to be paged on capacity events (12-06-2026).
  usage_limit_signatures: ["subscription access", "usage limit", "rate limit", "limit reached"]

process:
  agent_timeout_s: 3600
  max_parallel_agents: 4          # economics knob (5h subscription window), not a technical limit
  ndjson_log_dir: .factory/logs   # operational, gitignored
  db_path: .factory/factory.db    # SQLite WAL, orchestrator-exclusive (DoD §6)
  db_busy_timeout_ms: 5000
  liveness_file: .factory/liveness
  pid_file: .factory/orchestrator.pid   # also the single-instance flock target
  terminate_grace_s: 10
  kill_grace_s: 5
  ndjson_max_line_bytes: 1048576
  test_suite_timeout_s: 1800
  loop_tick_s: 5                  # scheduler tick / liveness refresh
  heartbeat_min_interval_s: 1
  tier2_max_diff_bytes_per_unit: 300000
  stub_agent_path: tests/stub_agent.py   # used only by routes with cli: stub (tests)
  # Build/test droppings the §3.1 Validator-isolation assertion ignores (fnmatch
  # against each porcelain path and its path segments; directories end with /).
  isolation_ignore_globs: ["__pycache__/", "*.pyc", ".pytest_cache/", ".ruff_cache/"]

canon:
  # Canon files injected into agent system prompts (decision D-0009).
  # claude CLI -> --append-system-prompt; codex CLI -> AGENTS.md in workspace / prompt prefix.
  files:
    doctrine: "00 - DOCTRINA.md"
    conventions: work-protocols/conventions.md
    founder_protocol: work-protocols/protocol_interactiune_founder.md
  inject:
    pipeline_agents: [doctrine, conventions]            # every role producing artifacts or judgment
    founder_facing: [doctrine, conventions, founder_protocol]
    consultation_points: []   # pure functions, mechanically validated; flip on if DoD §13 CP-quality trigger fires
  founder_facing_roles: [intake, decision_session, main_architect, phase_architect, notify]
